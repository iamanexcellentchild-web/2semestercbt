{% extends "base.html" %}
{% block content %}
<div class="login-wrap">
    <h2>🎓 Student Login</h2>
    <p style="color:#555; font-size:0.9rem; margin-bottom:1.2rem">Enter your name to continue to your study dashboard. Returning students are taken straight in.</p>
    <form method="post">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="e.g. John Doe" required autofocus>
        </div>
        <button type="submit" class="login-btn">Continue</button>
    </form>
</div>
{% endblock %}
