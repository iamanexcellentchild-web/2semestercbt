{% extends "base.html" %}
{% block content %}

<!-- Admin Login -->
<div style="max-width: 500px; margin: 4rem auto;">
    <div class="card" style="padding: 3rem; text-align: center;">
        <div style="font-size: 3rem; margin-bottom: 1rem;">🔐</div>
        <h1 style="font-size: 1.8rem; margin-bottom: 0.5rem;">Admin Panel</h1>
        <p style="color: #64748b; margin-bottom: 2rem;">License Code Generator</p>
        
        <form method="POST" action="{{ url_for('admin') }}">
            <input type="hidden" name="action" value="login">
            
            <div style="margin-bottom: 1.5rem;">
                <label for="password" style="display: block; font-weight: 600; margin-bottom: 0.75rem; text-align: left;">Admin Password</label>
                <input type="password" 
                       id="password" 
                       name="password" 
                       placeholder="Enter admin password" 
                       required 
                       autofocus
                       style="width: 100%; padding: 0.75rem 1rem; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1rem;">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem; font-size: 1rem;">
                🔓 Unlock Admin Panel
            </button>
        </form>
    </div>
</div>

{% endblock %}
